<!DOCTYPE HTML>
<!--
  @author: Deven Patel
  @description: 404 Page
-->
<html lang="en">
<head>
  <title>404 &mdash; Page Not Found | Deven Patel</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <link rel="apple-touch-icon" href="images/favicon.ico" />
  <style>
    /* ─── 404-specific styles ─── */
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    .not-found-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    }

    /* Ambient orbs */
    .not-found-orb-1 {
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(80px);
      top: -100px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .not-found-orb-2 {
      position: absolute;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(0,136,255,0.06) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(80px);
      bottom: 0; right: 10%;
      pointer-events: none;
    }

    /* The big 404 */
    .not-found-code {
      font-family: var(--font-display);
      font-size: clamp(7rem, 20vw, 14rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
      position: relative;
      z-index: 1;
      /* Gradient text */
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    /* Glitch overlay layers */
    .not-found-code::before,
    .not-found-code::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .not-found-code::before {
      animation: glitch-1 3.5s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      transform: translate(-3px, 0);
    }
    .not-found-code::after {
      animation: glitch-2 3.5s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translate(3px, 0);
    }

    @keyframes glitch-1 {
      0%, 90%, 100% { transform: translate(-3px, 0); opacity: 0; }
      92%            { transform: translate(-3px, -2px); opacity: 0.4; }
      94%            { transform: translate(3px, 2px); opacity: 0.4; }
      96%            { transform: translate(-3px, 0); opacity: 0; }
    }
    @keyframes glitch-2 {
      0%, 90%, 100% { transform: translate(3px, 0); opacity: 0; }
      93%            { transform: translate(3px, 2px); opacity: 0.3; }
      95%            { transform: translate(-3px, -2px); opacity: 0.3; }
      97%            { transform: translate(3px, 0); opacity: 0; }
    }

    .not-found-inner {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .not-found-label {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }
    .not-found-label::before,
    .not-found-label::after {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--accent);
    }

    .not-found-title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }

    .not-found-desc {
      font-size: 1rem;
      color: var(--text-dim);
      line-height: 1.75;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.6s forwards;
    }

    .not-found-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.75s forwards;
    }

    /* Quick links */
    .not-found-links {
      margin-top: 3.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeIn 0.6s ease 1s forwards;
    }
    .not-found-links-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dimmer);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .not-found-nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      list-style: none;
    }
    .not-found-nav a {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      text-decoration: none;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }
    .not-found-nav a:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    /* Footer */
    .not-found-footer {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dimmer);
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.2s forwards;
    }
    .not-found-footer a {
      color: var(--text-dimmer);
      text-decoration: none;
      transition: color 0.2s;
    }
    .not-found-footer a:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .not-found-footer { display: none; }
    }
  </style>
</head>

<body>

  <main class="not-found">
    <div class="not-found-grid"></div>
    <div class="not-found-orb-1"></div>
    <div class="not-found-orb-2"></div>

    <div class="not-found-code">404</div>

    <div class="not-found-inner">
      <div class="not-found-label">Error</div>
      <h1 class="not-found-title">This page doesn't exist.</h1>
      <p class="not-found-desc">
        Looks like you've followed a broken link or typed a URL that doesn't live here.
        Let's get you back on track.
      </p>
      <div class="not-found-actions">
        <a href="index.html" class="btn btn-primary">&larr; Back to home</a>
        <a href="mailto:iamdevenpatel@gmail.com" class="btn btn-outline">Contact me</a>
      </div>

      <div class="not-found-links">
        <div class="not-found-links-label">Or jump to a section</div>
        <ul class="not-found-nav">
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#experience">Experience</a></li>
          <li><a href="index.html#skills">Skills</a></li>
          <li><a href="index.html#projects">Projects</a></li>
          <li><a href="index.html#education">Education</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </div>

    <div class="not-found-footer">
      &copy; <span id="year"></span> Deven Patel
    </div>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
